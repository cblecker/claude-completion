name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ">=3.14"

      - name: Validate JSON and bash syntax
        run: make validate

      - name: Verify generated script matches data
        run: make verify-generation

  test:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ">=3.14"

      - name: Install bash-completion
        run: sudo apt-get update && sudo apt-get install -y bash-completion

      - name: Run completion tests
        run: make test
